# Codemagic configuration for Glory to God PPEC Mobile (React Native / Expo)
# See: https://docs.codemagic.io/yaml-quick-start/building-a-react-native-app

workflows:
  # Minimal first workflow - use "Check for configuration file" in Codemagic to detect this
  sample-workflow:
    name: Codemagic Sample Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2

  # Android build workflow
  android-workflow:
    name: Android Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        # Add codemagic-defaults or your env groups in Codemagic UI
      vars:
        PACKAGE_NAME: "com.glorytogod.ppec"
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      # Uncomment and configure when ready to publish
      # google_play:
      #   credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      email:
        recipients:
          # Add your email for build notifications
        notify:
          success: true
          failure: true
